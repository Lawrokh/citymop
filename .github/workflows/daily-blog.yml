name: Daily Blog Post Generation

on:
  schedule:
    # Codziennie o 7:00 UTC (9:00 czasu polskiego)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Możliwość ręcznego uruchomienia z GitHub UI

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic

      - name: Copy SEO knowledge file if missing
        run: |
          if [ ! -f scripts/seo_encyklopedia_rag.jsonl ]; then
            echo "Warning: scripts/seo_encyklopedia_rag.jsonl not found"
          fi

      - name: Generate today's post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python scripts/build_blog.py

      - name: Commit and push changes
        run: |
          git config user.name "CityMop Bot"
          git config user.email "bot@citymop.pl"
          git add blog/ sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📝 Nowy wpis blogowy — $(date +'%Y-%m-%d')"
            git push
          fi
